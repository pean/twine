# Twine tmux configuration
# Add this to your ~/.tmux.conf or source it directly:
# source-file /path/to/twine/tmux.conf

# Open agents dashboard in popup (prefix + a)
bind-key a display-popup -E -w 90% -h 90% "twine agents"

# Alternative: Open in a split pane instead of popup
# bind-key a split-window -h "twine agents"
